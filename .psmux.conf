# vi:se ft=tmux:

set -g prefix C-q
unbind C-b

set-option -g status-position top

set-option -g status-left-length 90
set-option -g status-right-length 90

# #P => pane number
set-option -g status-left '#H:[#P]'

set-option -g status-right '#(wifi) #(battery --tmux) [%Y-%m-%d(%a) %H:%M]'

set-option -g status-justify centre

# use vim key bind to move around between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# use vim key bind to resize a pane
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# | to split pane vertically
bind | split-window -h
unbind %

# - to split pane horizontally
bind - split-window -v
unbind '"'

set-option -g base-index 1

# enable mouse manipulation
set-option -g mouse on
set-option -g mouse-selection on

# set up copy mode
# use vim keybind in copy mode
setw -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi Y send -X copy-line

