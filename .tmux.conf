set-option -g default-shell /usr/bin/bash

set-option -g default-terminal 'screen-256color'
set-option -ag terminal-overrides ',xterm:colors=256'

set -g prefix C-q
unbind C-b

set-option -g status-position top

set-option -g status-left-length 90
set-option -g status-right-length 90

# #P => pane number
set-option -g status-left '#H:[#P]'

set-option -g status-right '#(wifi) #(battery --tmux) [%Y-%m-%d(%a) %H:%M]'

set-option -g status-justify centre

# set color for status line -- disabled temporalily for not reflected
# set-option -g status-bg "colour238"
# set-option -g status-fg "colour255"

# use vim key bind to move around between panes
bind-key    -T prefix h select-pane -L
bind-key    -T prefix j select-pane -D
bind-key    -T prefix k select-pane -U
bind-key    -T prefix l select-pane -R

# use vim key bind to resize a pane
bind-key -r -T prefix H resize-pane -L 5
bind-key -r -T prefix J resize-pane -D 5
bind-key -r -T prefix K resize-pane -U 5
bind-key -r -T prefix L resize-pane -R 5

# | to split pane vertically
bind-key    -T prefix | split-window -h
unbind %

# - to split pane horizontally
bind-key    -T prefix - split-window -v
unbind '"'

set-option -g base-index 1

# enable mouse manipulation
set-option -g mouse on
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# set up copy mode
# use vim keybind in copy mode
setw -g mode-keys vi

bind-key    -T prefix       v   copy-mode
bind-key    -T copy-mode-vi v   send -X begin-selection
bind-key    -T copy-mode-vi V   send -X select-line
bind-key    -T copy-mode-vi C-v send rectangle-toggle
bind-key    -T copy-mode-vi y   send -X copy-selection
bind-key    -T copy-mode-vi Y   send -X copy-line

bind-key                    C-p paste-buffer

